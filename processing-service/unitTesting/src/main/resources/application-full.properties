server.port=8007
spring.application.name=full-testing-orchestrator

# Orchestrator does not register with Eureka (unit testing service still uses Eureka on 8006).
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

spring.devtools.restart.enabled=false

# Unit testing API (separate JVM on 8006 by default).
unittesting.base-url=http://localhost:8006

# Root of the Tool repo (JSON + logs are relative to this). Override if your working directory is not the repo root.
fulltesting.tool-root=${user.dir}

# Before each /unit call, hit restart on unit-testing so sequential runs stay consistent.
fulltesting.restart-before-each-request=true

# If true, also try shell restart (kill 8006 + mvn) when unit testing never becomes ready. Prefer false — start unit testing yourself.
fulltesting.fallback-shell-restart=false